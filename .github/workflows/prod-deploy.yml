name: Production Deploy (main)

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-prod
  cancel-in-progress: false

env:
  SERVICES_URL: https://api.t-pen.org
  RERUM_URL: https://store.rerum.io/v1

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set TPEN_ENV=prod
        run: echo "TPEN_ENV=prod" >> $GITHUB_ENV

      - name: Generate runtime env file (prod)
        run: echo "window.TPEN_ENV='prod'" > config.env.js

      - name: Install curl and jq
        run: sudo apt-get update && sudo apt-get install -y curl jq

      - name: Smoke test TPEN services API health
        run: |
          set -e
          echo "Testing $SERVICES_URL API availability"
          # Simple HEAD check to verify API is responding
          curl -fsI --retry 3 --retry-delay 2 "$SERVICES_URL" >/dev/null || {
            echo "API health check failed - $SERVICES_URL not responding"
            exit 1
          }
          echo "✓ TPEN services API is reachable"

      - name: Smoke test RERUM store reachability
        run: |
          set -e
          echo "HEAD $RERUM_URL"
          curl -fsI --retry 3 --retry-delay 2 "$RERUM_URL" >/dev/null

  build:
    needs: smoke
    runs-on: ubuntu-latest
    env:
      TPEN_ENV: prod
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure TPEN_ENV=prod
        run: echo "TPEN_ENV=prod" >> $GITHUB_ENV

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  test:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: Run unit and contract tests
        run: npm test

      - name: Publish pact to PactFlow
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
        run: npm run pact:publish

  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (Production)
        id: deployment
        uses: actions/deploy-pages@v4

  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against deployed site
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.page_url || 'https://three.t-pen.org' }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
